<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Laguna Nav - Realtime Depth</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: sans-serif; }
        #map { height: 100vh; width: 100vw; }
        
        #dashboard {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 15px;
            border-radius: 15px;
            width: 80%;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }
        .data-box { display: flex; flex-direction: column; }
        .value { font-size: 1.2em; font-weight: bold; color: #00d1ff; }
        .label { font-size: 0.7em; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="dashboard">
        <div class="data-box">
            <span class="label">Marea (PS)</span>
            <span id="marea-val" class="value">-- cm</span>
        </div>
        <div class="data-box">
            <span class="label">Fondale</span>
            <span id="fondo-val" class="value">-- m</span>
        </div>
        <div class="data-box">
            <span class="label">Prof. Totale</span>
            <span id="prof-val" class="value" style="color: #00ff88;">-- m</span>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
